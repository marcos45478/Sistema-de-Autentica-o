<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='unnamed.jpg') }}" type="image/png">
</head>
<body>
    <div class="container">
        <form action="/login" method="post">
            <img src="{{ url_for('static', filename='unnamed.jpg') }}" alt="Login Image" class="login-image"><br><br>
            <h1>BEM-VINDO</h1>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required><br><br>
            <input type="submit" value="Login">
            <a href="/cadastro">Não tem uma conta? Cadastre-se aqui</a>
        </form>
    </div>
</body>
</html>
